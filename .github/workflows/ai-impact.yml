name: AI Test Impact Analysis

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff (PR only changes)
        shell: bash
        run: |
          git fetch origin main

          git diff "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" > diff.txt
          git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" > files.txt

          echo "Generated diff.txt and files.txt"
          wc -c diff.txt || true
          wc -l files.txt || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install --disable-pip-version-check --no-cache-dir openai

      - name: Run AI Analysis (GitHub Models endpoint)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/analyze.py

      - name: Post/Update PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const marker = "<!-- ai-impact-analysis -->";
            const bodyRaw = fs.readFileSync('output.txt', 'utf8');
            const body = `${marker}\n${bodyRaw}`.trim();

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const existing = comments.find(c => (c.body || "").includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });
            }
